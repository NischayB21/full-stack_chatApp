apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: chatapp-myingress
  namespace: chat-app
  labels:
    app: chatapp
  annotations:
      nginx.ingress.kubernetes.io/rewrite-target: /
      nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  rules:
  - host: chat-app.com
    http:
      paths:
      - pathType: Prefix
        path: "/api"
        backend:
          service:
            name: backend
            port: 
              number: 5001
      - pathType: Prefix
        path: "/"
        backend:
          service:
            name: frontend
            port: 
              number: 80


              
